name: check for drift
description: This action checks for drift
inputs:
    branch:
        description: 'The branch to check for drift on'
        required: true
    higher_branch:
        description: 'The branch to compare against, e.g. main or develop'
        required: false
    higher_environment:
        description: 'The environment of the higher branch, e.g. prod or staging'
        required: true
    run_cd_checks:
        description: 'Whether to run cd checks, true or false'
        required: true
outputs:
    output_file_location:
        description: 'The location of the output file containing drift details'
        value: ${{ steps.output_drift_details.outputs.plan_output_file }}
    check_for_drift_outcome:
        description: 'The outcome of the check for drift step, success or failure'
        value: ${{ steps.check_state_of_environment_step.outcome }}
    module_with_drift:
        description: 'The module which has drift'
        value: ${{ steps.check_state_of_environment_step.outputs.module_with_drift }}
runs:
    using: "composite"
    steps:
        - name: set file path
          shell: bash
          run: |
            echo "json_file_route=/tmp/${{ inputs.higher_environment }}/json" >> "${GITHUB_ENV}"
            echo "tf_plan_file_route=/tmp/${{ inputs.higher_environment }}/plan" >> "${GITHUB_ENV}"

        - name: check for drift
          id: check_state_of_environment_step
          run: ${{ github.action_path }}/check_for_drift.sh
          shell: bash
          env:
            branch: ${{ inputs.branch }}
            higher_branch: ${{ inputs.higher_branch }}
            testing_environment: ${{ inputs.higher_environment }}
            run_cd_checks: ${{ inputs.run_cd_checks }}
            tf_plan_json_route: ${{ env.json_file_route }}
            tf_plan_file_route: ${{ env.tf_plan_file_route }}
          continue-on-error: true
        
        - name: set output for module with drift
          id: output_drift_details
          if: steps.check_state_of_environment_step.outcome == 'failure'
          run: | 
            echo ${{ steps.check_state_of_environment_step.outputs.module_with_drift }}
            ls ${{ env.tf_plan_file_route }}
            cat ${{ env.tf_plan_file_route }}/tfplan.binary

            plan_output_file="/tmp/check_drift_plan_output.txt"
            echo "plan_output_file=$plan_output_file" >> "${GITHUB_OUTPUT}"

            terragrunt show ${{ env.tf_plan_file_route }}/tfplan.binary --working-dir ${{ steps.check_state_of_environment_step.outputs.module_with_drift }} --no-color 2>&1 | tee $plan_output_file
          shell: bash
        