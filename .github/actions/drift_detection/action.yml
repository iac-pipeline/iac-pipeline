name: check for drift
description: This action checks for drift
inputs:
    branch:
        description: 'The branch to check for drift on'
        required: true
    higher_branch:
        description: 'The branch to compare against, e.g. main or develop'
        required: false
    higher_environment:
        description: 'The environment of the higher branch, e.g. prod or staging'
        required: true
    run_cd_checks:
        description: 'Whether to run cd checks, true or false'
        required: true
outputs:
    output_comment_body:
        description: 'The body of the comment to be posted on the PR'
        value: ${{ steps.create_failure_comment.outputs.comment_body }}
    check_for_drift_outcome:
        description: 'The outcome of the check for drift step, success or failure'
        value: ${{ steps.check_state_of_environment.outcome }}
runs:
    using: "composite"
    steps:
        - name: set file path
          shell: bash
          run: |
            echo "json_file_route=/tmp/${{ inputs.higher_environment }}/json" >> "${GITHUB_ENV}"
            echo "tf_plan_file_route=/tmp/${{ inputs.higher_environment }}/plan" >> "${GITHUB_ENV}"

        - name: check for drift
          id: check_state_of_environment
          run: ${{ github.action_path }}/check_for_drift.sh
          shell: bash
          env:
            branch: ${{ inputs.branch }}
            higher_branch: ${{ inputs.higher_branch }}
            testing_environment: ${{ inputs.higher_environment }}
            run_cd_checks: ${{ inputs.run_cd_checks }}
            tf_plan_json_route: ${{ env.json_file_route }}
            tf_plan_file_route: ${{ env.tf_plan_file_route }}
          continue-on-error: true
        
        - name: set output for module with drift
          if: steps.check_state_of_environment.outcome == 'failure'
          run: | 
            echo ${{ steps.check_state_of_environment.outputs.module_with_drift }}
            ls ${{ env.tf_plan_file_route }}
            cat ${{ env.tf_plan_file_route }}/tfplan.binary

            plan_output_file="/tmp/check_drift_plan_output.txt"
            echo "plan_output_file=$plan_output_file" >> "${GITHUB_OUTPUT}"

            terragrunt show ${{ env.tf_plan_file_route }}/tfplan.binary --working-dir ${{ steps.check_state_of_environment.outputs.module_with_drift }} --no-color 2>&1 | tee $plan_output_file
          shell: bash

        - name: create failure comment
          if: steps.check_state_of_environment.outcome == 'failure'
          run: |
            comment_body=$(cat << EOF 
            ### Drift detected in module ${{ steps.check_state_of_environment.outputs.module_with_drift }} ###
            ### Drift must be resolved before this PR can be merged. ###
            ### Plan output: for ${{ steps.check_state_of_environment.outputs.module_with_drift }} ###
            cat ${{ steps.check_state_of_environment.outputs.plan_output_file }}
            EOF
            )
            echo "comment_body=$comment_body" >> "${GITHUB_OUTPUT}"
          shell: bash
        