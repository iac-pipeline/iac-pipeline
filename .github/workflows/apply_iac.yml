name: check for drift
run-name: Checking for drift for ${{ github.actor }}
on:
  workflow_call:
    inputs:
        production_branch:
            required: true
            type: string
        production_environment:
            required: false
            type: string
        iac_technology:
            required: true
            type: string
    secrets:
        cloud_token:
            required: true

permissions:
  contents: read 
  security-events: write 
  actions: read 

jobs:
    apply_iac:
        runs-on: ubuntu-24.04
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                ref: ${{ inputs.production_branch }}
                fetch-depth: 0

            - uses: 'google-github-actions/auth@v3'
              with:
                credentials_json: '${{ secrets.cloud_token }}'

            - name: Set up python 3.9
              uses: actions/setup-python@v4
              with:
                python-version: 3.9
            
            - name: set up terraform
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.7.5"

            - name: Install Terragrunt and OpenTofu
              uses: gruntwork-io/terragrunt-action@v3
              with:
                tg_version: '0.99.1'
                tf_path: ${{ inputs.iac_technology }}
            
            - name: apply iac
              id: apply_iac
              run: |
                set -ex
                commit_before_merge=$(git rev-parse HEAD^1)
                echo "Commit before merge: $commit_before_merge"
                modules_changes=$(terragrunt run --all find --filter "[${{ inputs.production_branch }} ... $commit_before_merge]" | grep /${{ inputs.production_environment }}/)
                echo "Modules changed in this PR: $modules_changes"

                if [[ -z "$modules_changes" ]]; then
                  echo "No modules changed in this PR, skipping apply"
                  exit 0
                fi

                for module in $modules_changes; do
                  if [[ -d "$module" ]] && [[ -f "$module/terragrunt.hcl" ]]; then
                    terragrunt run --all --json-out-dir /tmp/${{ inputs.production_environment }}/json apply --working-dir "$module" -auto-approve
                    echo "command_status=$?" >> "${GITHUB_OUTPUT}"
                  fi
                done
                echo "Modules changed: $modules_changes"
              
            - name: check apply status
              run: |
                if [[ "${{ steps.apply_iac.outputs.command_status }}" == "0" ]]; then
                  echo "Apply successful for all modules"
                else
                  echo "::error ::Apply failed for one or more modules with exit code ${{ steps.apply_iac.outputs.command_status}}"
                  exit 1
                fi

