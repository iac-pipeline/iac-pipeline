name: drift-detection-check
run-name: Checking drift for${{ github.actor }}
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      higher_branch:
        required: false
        type: string
      # iac_tool:
      #   required: true
      #   type: string
      iac_technology:
        required: true
        type: string
      lower_environment:
        required: true
        type: string
      higher_environment:
        required: true
        type: string
      run_cd_checks:
        required: true
        type: string
    secrets:
      cloud_token:
        required: true
# env:
#   higher_branch: ${{ inputs.branch == 'develop' && 'main' }}
permissions:
  pull-requests: write
  contents: read 
  security-events: write 
  actions: read 
jobs:
  check_for_drift:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout higher branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.higher_branch }}
          fetch-depth: 0
      
      - uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.cloud_token }}'

      - name: Set up python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: set up terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Install Terragrunt and OpenTofu
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.99.1'
          tf_path: ${{ inputs.iac_technology }}
      
      - name: check for drift
        id: check_state_of_environment
        uses: iac-pipeline/iac-pipeline/.github/actions/drift_detection@develop
        with:
          branch: ${{ inputs.branch }}
          higher_branch: ${{ inputs.higher_branch }}
          higher_environment: ${{ inputs.higher_environment }}
          run_cd_checks: ${{ inputs.run_cd_checks }}
      
      - name: send comment to user on PR
        if: steps.check_state_of_environment.outputs.check_for_drift_outcome == 'failure'
        uses: iac-pipeline/iac-pipeline/.github/actions/write_comment@develop
        with:
          custom_plan_location: ${{ steps.check_state_of_environment.outputs.output_file_location }}
          custom_body_message: "Drift detected in module ${{ steps.check_state_of_environment.outputs.module_with_drift }}"
      
      - name: end script with failure exit code
        if: steps.check_state_of_environment.outputs.check_for_drift_outcome == 'failure'
        run: exit 1

