name: drift-detection-check
run-name: Checking drift for${{ github.actor }}
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      higher_branch:
        required: false
        type: string
      # iac_tool:
      #   required: true
      #   type: string
      iac_technology:
        required: true
        type: string
    secrets:
      cloud_token:
        required: true
# env:
#   higher_branch: ${{ inputs.branch == 'develop' && 'main' }}
permissions:
  contents: read 
  security-events: write 
  actions: read 
jobs:
  check_for_drift:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout higher branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.higher_branch }}
          fetch-depth: 0
      
      - uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.cloud_token }}'

      - name: Set up python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: set up terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Install Terragrunt and OpenTofu
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.99.1'
          tf_path: "terraform"

      - name: check state of environment
        run: |
          # change this value to fit for the higher environment, e.g. prod, staging, dev

          environment="dev"

          git fetch origin 

          git branch -a

          terragrunt run --all init

          git checkout ${{ inputs.branch }}


          modules_changed=$(terragrunt find --filter-affected --format json | jq .)

          git checkout ${{ inputs.higher_branch }}


          for module in $(echo "$modules_changed" | jq -r '.[].path' | grep "$environment" ); do
              if [ -d "$module" ]; then
                  echo "Module $module exists. Planning module: $module"
                  terragrunt run --all --json-out-dir /tmp/json plan --working-dir "$module" -out-dir /tmp/tfplan
                  # terragrunt show -json "/tmp/plan_output_$module.tfplan" > "/tmp/plan_output_$module.json"
                  # rm "/tmp/plan_output_$module.tfplan"
                  grab_json_body=$(jq -r '.resource_changes[] | select(.change.actions | index("no-op") | not) | "\(.address) → actions: \(.change.actions | join(", "))" ' /tmp/json/tfplan.json)    
                  
                  # get all the actions from the tfplan json and loop through them, if any of them are not no-op then we have drift
                  actions=$( jq -r '.resource_changes[].change.actions' /tmp/json/tfplan.json) 
                  echo $actions
                  for action in $( echo $actions | jq -r '.[]'); do
                      if [[ "$action" == "no-op" ]]; then
                          echo $action
                          echo "No changes for module: $module"
                      else
                          #DRIFT DETECTED
                          echo $action
                          echo "Changes detected for module: $module"
                          echo "Resources with changes: $grab_json_body"
                      fi
                  done
              else
                  echo "Module $module does not exist in higher environment. Skipping validation."
                  continue
              fi
          done

          git checkout ${{ inputs.branch }}

